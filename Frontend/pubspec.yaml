name: equb_app
description: Equb Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  go_router: ^13.2.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  firebase_core: ^2.31.1
  firebase_messaging: ^14.9.1
  flutter_local_notifications: ^17.2.1
  easy_localization: ^3.0.7
  fl_chart: ^0.67.0
  image_picker: ^1.1.2
  image_cropper: ^7.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  share_plus: ^9.0.0
  pin_code_fields: ^8.0.1
  local_auth: ^2.3.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
